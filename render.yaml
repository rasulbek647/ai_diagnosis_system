services:
  - type: web
    name: ai-diagnosis-system-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: AI Diagnosis API
      - key: ACCESS_TOKEN_EXPIRE_HOURS
        value: 24
      - key: DATABASE_URL
        value: sqlite:///./medai.db
      - key: CORS_ORIGINS
        value: "*"
      - key: ADMIN_FULL_NAME
        value: System Admin
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
