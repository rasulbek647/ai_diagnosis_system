# Netlify: loyiha ildizi — frontend papkasi
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  base = "frontend"
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# React Router (SPA): /dashboard, /login va boshqalar to'g'ri ochilsin
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
